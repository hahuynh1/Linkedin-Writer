<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LinkedIn Message Writer — Quartile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161617;
    --surface2: #1e1e20;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #8a8782;
    --text3: #555250;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-text: #3a4a00;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 80px;
  }

  .wrap {
    width: 100%;
    max-width: 560px;
  }

  .header {
    margin-bottom: 40px;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 26px;
    font-weight: 500;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
  }

  .api-row {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    align-items: center;
  }

  .api-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .api-row input:focus { border-color: var(--border2); }
  .api-row input::placeholder { color: var(--text3); }

  .api-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

  .field label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    min-height: 80px;
  }

  .field textarea:focus { border-color: var(--border2); }
  .field textarea::placeholder { color: var(--text3); font-size: 13px; }

  .tone-row { margin-bottom: 28px; }

  .tone-row label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .pills { display: flex; gap: 8px; }

  .pill {
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .pill:hover { border-color: var(--border2); color: var(--text); }

  .pill.active {
    background: var(--accent-dim);
    border-color: rgba(200,240,96,0.3);
    color: var(--accent);
  }

  .generate-btn {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font);
    border-radius: var(--radius);
    border: 1px solid rgba(200,240,96,0.25);
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    margin-bottom: 24px;
  }

  .generate-btn:hover {
    background: rgba(200,240,96,0.18);
    border-color: rgba(200,240,96,0.4);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: none;
  }

  .output-box.visible { display: block; }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .output-label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .copy-btn {
    font-size: 12px;
    font-family: var(--mono);
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .output-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.75;
    white-space: pre-wrap;
    min-height: 40px;
  }

  .output-text.streaming { color: var(--text2); }

  .char-count {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    margin-top: 12px;
    text-align: right;
  }

  .char-count.over { color: #e06060; }

  .error {
    font-size: 13px;
    color: #e06060;
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(224,96,96,0.08);
    border: 1px solid rgba(224,96,96,0.15);
    border-radius: var(--radius);
    display: none;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 1.5px solid rgba(200,240,96,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .chat-box { margin-top: 16px; display: none; }
  .chat-box.visible { display: block; }
  .chat-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .chat-history { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .chat-msg { font-size: 13px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; max-width: 90%; }
  .chat-msg.user { background: var(--surface2); color: var(--text2); align-self: flex-end; border: 1px solid var(--border); }
  .chat-msg.assistant { background: var(--accent-dim); color: var(--text); border: 1px solid rgba(200,240,96,0.15); align-self: flex-start; }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input-row textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; padding: 10px 12px; resize: none; outline: none; line-height: 1.5; min-height: 42px; max-height: 120px; transition: border-color 0.15s; }
  .chat-input-row textarea:focus { border-color: var(--border2); }
  .chat-input-row textarea::placeholder { color: var(--text3); }
  .send-btn { padding: 10px 16px; font-size: 13px; font-family: var(--font); font-weight: 500; border-radius: var(--radius); border: 1px solid rgba(200,240,96,0.25); background: var(--accent-dim); color: var(--accent); cursor: pointer; transition: all 0.15s; white-space: nowrap; height: 42px; }
  .send-btn:hover { background: rgba(200,240,96,0.18); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="badge">Quartile SDR</div>
    <h1>LinkedIn message writer</h1>
    <p class="subtitle">Paste in anything from their profile. All three fields are optional — use what you've got.</p>
  </div>

  <div class="api-row">
    <span class="api-label">API KEY</span>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
  </div>

  <hr class="divider" />

  <div class="fields">
    <div class="field">
      <label>Recent post</label>
      <textarea id="post" placeholder="Paste something they posted recently..."></textarea>
    </div>
    <div class="field">
      <label>About section</label>
      <textarea id="about" placeholder="Paste their bio or about section..."></textarea>
    </div>
    <div class="field">
      <label>Something worth noting</label>
      <textarea id="note" rows="2" placeholder="e.g. follows a digital marketing AI group, launched a side project, just got promoted, expanding to new markets..." style="min-height:60px;"></textarea>
    </div>
  </div>

  <div class="tone-row">
    <label>Tone</label>
    <div class="pills">
      <button class="pill active" data-tone="conversational">Conversational</button>
      <button class="pill" data-tone="direct">Direct</button>
      <button class="pill" data-tone="playful">Playful</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">Generate message</button>

  <div class="output-box" id="outputBox">
    <div class="output-header">
      <span class="output-label">Message</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="output-text" id="outputText"></div>
    <div class="char-count" id="charCount"></div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="chat-box" id="chatBox">
    <div class="chat-label">Refine it</div>
    <div class="chat-history" id="chatHistory"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="e.g. make it shorter, remove the last line, more casual..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

</div>

<script>
  let selectedTone = 'conversational';
  let conversationHistory = [];
  let currentSystemPrompt = '';

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedTone = pill.dataset.tone;
    });
  });

  document.getElementById('generateBtn').addEventListener('click', async () => {
    const apiKey = document.getElementById('apiKey').value.trim();
    const post = document.getElementById('post').value.trim();
    const about = document.getElementById('about').value.trim();
    const note = document.getElementById('note').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';

    if (!apiKey) {
      errorMsg.textContent = 'Add your Anthropic API key at the top to get started.';
      errorMsg.style.display = 'block';
      return;
    }

    if (!post && !about && !note) {
      errorMsg.textContent = 'Paste in at least one thing about the prospect.';
      errorMsg.style.display = 'block';
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Generating...';

    const outputBox = document.getElementById('outputBox');
    const outputText = document.getElementById('outputText');
    const charCount = document.getElementById('charCount');
    outputBox.classList.add('visible');
    outputText.textContent = '';
    outputText.classList.add('streaming');
    charCount.textContent = '';

    const prospectContext = [
      post && `Recent post: "${post}"`,
      about && `About section: "${about}"`,
      note && `Worth noting: ${note}`
    ].filter(Boolean).join('\n\n');

    const toneGuide = {
      conversational: 'Warm and curious. Feels like a genuine observation from someone who actually looked at their profile.',
      direct: 'Short, confident, no filler. One or two lines then a soft question.',
      playful: 'Light and fun — wit or humor if the context genuinely earns it. Never forced.'
    }[selectedTone];

    const systemPrompt = `You write short, personalized LinkedIn opening messages for Hang, an SDR at Quartile — an AI-powered Amazon advertising optimization platform.

Here are real examples of Hang's messages that got replies. Study the style closely:

Example 1 — prospect followed a LinkedIn group called "Digital Marketing & AI":
"Was checking out your linkedin and saw you follow a digital marketing & AI group.
Are you actively exploring new tools or just keeping tabs on where ecom tech is heading?"

Example 2 — prospect was a COO who invented a product called HotRod (auto-rotating campfire hot dog stick):
"I think this is the coolest invention on linkedin [link]
How many hotdogs did you have to 'test' during the development phase?"

Example 3 — Hang had spoken to a co-owner previously; prospect's recent post mentioned restarting production at their Suzhou factory:
"Hi Ping - I spoke with Grace early this year about advertising strategies for Evergrace on Amazon.
Curious how you're managing your ad campaigns.
Mind if I ask a few questions about it?

ps happy chinese new year and resuming work in your suzhou factory!"

Example 4 — prospect was playing LinkedIn Zip and appeared on the leaderboard:
"[screenshot] You're the one I'm trying to beat on the zip leaderboard"

What makes these work:
- Hyper-specific observation — points at something exact, not vague flattery
- Zero pitch in the opener — no mention of Quartile or ads until it's earned
- One question max — short, low-commitment, sometimes playful
- PS footnote trick — personal detail tucked as a postscript, not forced into the main message
- Humor only when the context genuinely earns it
- Lowercase, casual feel — peer-to-peer, not corporate

Rules:
- Under 300 characters ideally, never exceed 500
- Never start with "I hope this message finds you well" or any generic opener
- Never name-drop Quartile in the opening message unless there's a very natural reason
- Goal is just to get a reply — not book a meeting, not pitch the product
- If there's something funny or unexpected in the prospect info, lean into it

Language rules — this is critical:
- Use simple, everyday words. If a simpler word exists, use it
- Write like a real person texting, not a marketer writing copy
- No buzzwords: never use "resonate", "leverage", "synergy", "innovative", "excited to connect", "reach out", "touch base", "circle back", "game-changer", "thrilled", "passionate", "delighted"
- No filler phrases: never use "I came across your profile", "I noticed", "I wanted to", "I thought I'd"
- Short sentences. Fragments are fine. How a person actually talks
- If it sounds like it was written by AI, rewrite it until it doesn't

Tone: ${toneGuide}

Return ONLY the message text. No explanation, no subject line, no preamble.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Write a LinkedIn opening message based on this prospect info:\n\n${prospectContext}` }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error');
      }

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      outputText.classList.remove('streaming');
      outputText.textContent = text;
      const len = text.length;
      charCount.textContent = `${len} characters`;
      charCount.className = 'char-count' + (len > 500 ? ' over' : '');

      conversationHistory = [
        { role: 'user', content: `Write a LinkedIn opening message based on this prospect info:\n\n${prospectContext}` },
        { role: 'assistant', content: text }
      ];
      currentSystemPrompt = systemPrompt;
      document.getElementById('chatHistory').innerHTML = '';
      document.getElementById('chatBox').classList.add('visible');

    } catch (err) {
      errorMsg.textContent = err.message || 'Something went wrong. Check your API key and try again.';
      errorMsg.style.display = 'block';
      outputBox.classList.remove('visible');
    }

    btn.disabled = false;
    btn.textContent = 'Generate message';
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('outputText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  });

  async function sendChatMessage() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const input = document.getElementById('chatInput').value.trim();
    if (!input) return;

    const sendBtn = document.getElementById('sendBtn');
    const chatHistory = document.getElementById('chatHistory');
    const outputText = document.getElementById('outputText');
    const charCount = document.getElementById('charCount');

    const userBubble = document.createElement('div');
    userBubble.className = 'chat-msg user';
    userBubble.textContent = input;
    chatHistory.appendChild(userBubble);

    document.getElementById('chatInput').value = '';
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span>';

    conversationHistory.push({ role: 'user', content: input });

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          system: currentSystemPrompt,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '';

      conversationHistory.push({ role: 'assistant', content: text });

      outputText.textContent = text;
      const len = text.length;
      charCount.textContent = `${len} characters`;
      charCount.className = 'char-count' + (len > 500 ? ' over' : '');

      const aiBubble = document.createElement('div');
      aiBubble.className = 'chat-msg assistant';
      aiBubble.textContent = 'Updated above';
      chatHistory.appendChild(aiBubble);
      chatHistory.scrollTop = chatHistory.scrollHeight;

    } catch (err) {
      const errBubble = document.createElement('div');
      errBubble.className = 'chat-msg assistant';
      errBubble.textContent = 'Something went wrong. Try again.';
      chatHistory.appendChild(errBubble);
    }

    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
  }

  document.getElementById('sendBtn').addEventListener('click', sendChatMessage);

  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  });
</script>
</body>
</html>
